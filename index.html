<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>案件线索提交</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <style>
        .drag-over { border-color: #3b82f6 !important; background-color: #eff6ff !important; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">
    <div class="max-w-2xl mx-auto px-4 py-10">
        <div class="text-center mb-8">
            <h1 class="text-2xl font-bold text-gray-800">案件线索提交</h1>
            <p class="text-gray-500 mt-2 text-sm">请如实填写以下信息，我们将尽快与您联系</p>
        </div>

        <form id="form" class="bg-white rounded-xl shadow-sm border border-gray-200 p-6 space-y-5">

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">姓名 <span class="text-red-500">*</span></label>
                <input type="text" id="name" required placeholder="请输入您的姓名"
                    class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">联系电话 <span class="text-red-500">*</span></label>
                <input type="tel" id="phone" required placeholder="请输入手机号码"
                    class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                <p id="phoneError" class="text-red-500 text-xs mt-1 hidden">请输入有效的手机号码</p>
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">案情描述 <span class="text-red-500">*</span></label>
                <textarea id="description" required rows="5" placeholder="请详细描述您的案情..."
                    class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent resize-y"></textarea>
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">上传证据文件</label>
                <p class="text-xs text-gray-400 mb-2">
                    支持格式：JPEG、PNG、PDF、DOC、DOCX、XLS、XLSX、MP3、WAV、MP4 | 单文件不超过 10MB，最多 5 个文件
                </p>
                <div id="dropZone"
                    class="border-2 border-dashed border-gray-300 rounded-lg p-8 text-center cursor-pointer hover:border-gray-400 transition-colors">
                    <svg class="mx-auto w-10 h-10 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                            d="M12 16V4m0 0L8 8m4-4l4 4M2 17l.621 2.485A2 2 0 004.561 21h14.878a2 2 0 001.94-1.515L22 17"/>
                    </svg>
                    <p class="mt-2 text-sm text-gray-500">点击选择文件或拖拽到此处</p>
                </div>
                <!-- 真正的文件输入框：视觉隐藏但功能完整 -->
                <input type="file" id="fileInput" multiple accept=".jpeg,.jpg,.png,.pdf,.doc,.docx,.xls,.xlsx,.mp3,.wav,.mp4"
                    style="position:absolute;width:0;height:0;opacity:0;pointer-events:none;">
                <ul id="fileList" class="mt-3 space-y-2 hidden"></ul>
                <p id="fileError" class="text-red-500 text-xs mt-1 hidden"></p>
            </div>

            <button type="submit" id="submitBtn"
                class="w-full bg-blue-600 text-white py-2.5 rounded-lg font-medium text-sm hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2 transition-colors disabled:opacity-50 disabled:cursor-not-allowed">
                提交线索
            </button>

            <div id="statusMsg" class="hidden rounded-lg p-4 text-sm"></div>
        </form>
    </div>

    <script>
    // ============================================================
    // 配置区域 - 请确认以下参数正确
    // 获取方式：Supabase Dashboard → Settings → API
    // ============================================================
    const SUPABASE_URL = 'https://zbkddqamjfromgrzxcpq.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inpia2RkcWFtamZyb21ncnp4Y3BxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg0ODc1MDEsImV4cCI6MjA5NDA2MzUwMX0.Xh3j_MwZyLhxnGfUPR591bY2Ee9ujRkR8o9LXBH3JSk';
    // ============================================================

    // 等待 DOM 完全加载后再执行
    document.addEventListener('DOMContentLoaded', function() {
        initApp();
    });

    function initApp() {
        // 检查 Supabase 库是否正确加载
        if (typeof window.supabase === 'undefined') {
            showStatus('页面加载异常：Supabase 库未正确加载，请检查网络连接后刷新页面。', 'error');
            return;
        }

        // 初始化 Supabase 客户端
        let supabaseClient;
        try {
            supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
            console.log("连接地址:", SUPABASE_URL);
            console.log("客户端初始化状态:", supabaseClient ? "成功" : "失败");
        } catch (e) {
            showStatus('Supabase 初始化失败：' + e.message, 'error');
            return;
        }

        // =============================================
        // 文件限制配置
        // =============================================
        const ALLOWED_EXTENSIONS = ['jpeg', 'jpg', 'png', 'pdf', 'doc', 'docx', 'xls', 'xlsx', 'mp3', 'wav', 'mp4'];
        const ALLOWED_MIME_TYPES = [
            'image/jpeg', 'image/png',
            'application/pdf',
            'application/msword',
            'application/vnd.openxmlformats-officedocument.wordprocessingml.document',
            'application/vnd.ms-excel',
            'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet',
            'audio/mpeg', 'audio/wav', 'audio/x-wav',
            'video/mp4'
        ];
        const MAX_FILE_SIZE = 10 * 1024 * 1024; // 10MB
        const MAX_FILE_COUNT = 5;
        const BUCKET_NAME = 'cases';

        let selectedFiles = [];

        // DOM 元素
        const form = document.getElementById('form');
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const fileList = document.getElementById('fileList');
        const fileError = document.getElementById('fileError');
        const phoneInput = document.getElementById('phone');
        const phoneError = document.getElementById('phoneError');
        const submitBtn = document.getElementById('submitBtn');
        const statusMsg = document.getElementById('statusMsg');

        if (!form || !dropZone || !fileInput) {
            showStatus('页面加载异常：关键元素缺失，请刷新页面重试。', 'error');
            return;
        }

        // =============================================
        // 点击上传区域 → 触发文件选择对话框
        // =============================================
        dropZone.addEventListener('click', function(e) {
            e.preventDefault();
            fileInput.click();  // 关键：触发隐藏的文件输入框
        });

        // 拖拽事件
        dropZone.addEventListener('dragover', function(e) {
            e.preventDefault();
            dropZone.classList.add('drag-over');
        });
        dropZone.addEventListener('dragleave', function() {
            dropZone.classList.remove('drag-over');
        });
        dropZone.addEventListener('drop', function(e) {
            e.preventDefault();
            dropZone.classList.remove('drag-over');
            if (e.dataTransfer && e.dataTransfer.files) {
                handleFiles(e.dataTransfer.files);
            }
        });

        // 文件选择回调
        fileInput.addEventListener('change', function() {
            if (fileInput.files && fileInput.files.length > 0) {
                handleFiles(fileInput.files);
            }
            // 重置 input，允许重复选择同一文件
            fileInput.value = '';
        });

        // =============================================
        // 处理选中的文件
        // =============================================
        function handleFiles(files) {
            hideError('fileError');

            for (let i = 0; i < files.length; i++) {
                const file = files[i];

                if (selectedFiles.length >= MAX_FILE_COUNT) {
                    showError('fileError', '最多只能上传 ' + MAX_FILE_COUNT + ' 个文件');
                    break;
                }

                // 校验文件扩展名
                const ext = file.name.split('.').pop().toLowerCase();
                if (ALLOWED_EXTENSIONS.indexOf(ext) === -1) {
                    showError('fileError', '不支持的文件格式: ' + file.name);
                    continue;
                }

                // 校验 MIME 类型（有些浏览器 file.type 为空，仅作辅助校验）
                if (file.type && ALLOWED_MIME_TYPES.indexOf(file.type) === -1) {
                    // 宽松处理：扩展名正确但 MIME 不匹配时仅警告，不阻断
                    console.warn('MIME type mismatch for ' + file.name + ': ' + file.type);
                }

                // 校验文件大小
                if (file.size > MAX_FILE_SIZE) {
                    showError('fileError', '文件过大: ' + file.name + '（最大 10MB）');
                    continue;
                }

                // 检查是否已存在同名同大小文件
                let isDuplicate = false;
                for (let j = 0; j < selectedFiles.length; j++) {
                    if (selectedFiles[j].name === file.name && selectedFiles[j].size === file.size) {
                        isDuplicate = true;
                        break;
                    }
                }
                if (isDuplicate) continue;

                selectedFiles.push(file);
            }

            renderFileList();
        }

        // 渲染已选文件列表
        function renderFileList() {
            if (selectedFiles.length === 0) {
                fileList.classList.add('hidden');
                fileList.innerHTML = '';
                return;
            }

            fileList.classList.remove('hidden');
            let html = '';
            for (let i = 0; i < selectedFiles.length; i++) {
                const file = selectedFiles[i];
                const sizeMB = (file.size / 1024 / 1024).toFixed(2);
                html += '<li class="flex items-center justify-between bg-gray-50 rounded-lg px-3 py-2 text-sm">' +
                    '<span class="text-gray-700 truncate max-w-[70%]">' + escapeHtml(file.name) + '</span>' +
                    '<div class="flex items-center gap-2">' +
                        '<span class="text-gray-400 text-xs">' + sizeMB + ' MB</span>' +
                        '<button type="button" onclick="window._removeFile(' + i + ')" class="text-red-400 hover:text-red-600 transition-colors">' +
                            '<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">' +
                                '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>' +
                            '</svg>' +
                        '</button>' +
                    '</div>' +
                '</li>';
            }
            fileList.innerHTML = html;
        }

        // 将 removeFile 暴露到全局，供 onclick 调用
        window._removeFile = function(index) {
            selectedFiles.splice(index, 1);
            renderFileList();
        };

        // 电话实时校验
        phoneInput.addEventListener('input', function() {
            const value = phoneInput.value.trim();
            const valid = /^1[3-9]\d{9}$/.test(value);
            if (value === '' || valid) {
                phoneError.classList.add('hidden');
            } else {
                phoneError.classList.remove('hidden');
            }
        });

        // =============================================
        // 生成文件夹名：YYYYMMDD_8位随机字符串
        // =============================================
        function generateFolderName() {
            const now = new Date();
            const y = now.getFullYear();
            const m = String(now.getMonth() + 1).padStart(2, '0');
            const d = String(now.getDate()).padStart(2, '0');
            const rand = Math.random().toString(36).substring(2, 10);
            return y + m + d + '_' + rand;
        }

        // =============================================
        // 生成安全的 Storage 文件名（纯 ASCII，不含中文）
        // 格式：时间戳_4位随机字符.扩展名
        // 例：1716345600000_a3f2.pdf
        // 原始中文文件名单独存入数据库 file_meta 字段
        // =============================================
        function generateSafeFileName(originalName) {
            // 提取扩展名（小写）
            const lastDot = originalName.lastIndexOf('.');
            const ext = lastDot > 0 ? originalName.substring(lastDot).toLowerCase() : '';
            // 时间戳 + 4位随机字符 → 全部 ASCII，Supabase Storage 可接受
            const ts = Date.now();
            const rand = Math.random().toString(36).substring(2, 6);
            return ts + '_' + rand + ext;
        }

        // =============================================
        // 表单提交
        // 流程：先上传所有文件到 Storage → 全部成功后写数据库
        // 如果任何一个文件上传失败 → 停止并显示具体错误，不写数据库
        // =============================================
        form.addEventListener('submit', async function(e) {
            e.preventDefault();

            // ---- 前端校验 ----
            const name = document.getElementById('name').value.trim();
            const phone = phoneInput.value.trim();
            const description = document.getElementById('description').value.trim();

            if (!name || !phone || !description) {
                showStatus('请填写所有必填项', 'error');
                return;
            }
            if (!/^1[3-9]\d{9}$/.test(phone)) {
                phoneError.classList.remove('hidden');
                phoneInput.focus();
                return;
            }

            // ---- 禁用提交按钮，防止重复提交 ----
            submitBtn.disabled = true;
            submitBtn.textContent = '提交中...';
            hideError('fileError');
            hideStatus();

            // 生成文件夹名（提前生成，上传和写库都用同一个）
            const folderName = generateFolderName();

            try {
                // =============================================
                // 第一步：上传所有文件到 Storage
                // 文件名使用纯 ASCII（时间戳_随机字符.扩展名）
                // 将原始中文文件名与 Storage 路径一起记录到 fileMeta 数组
                // =============================================
                const fileMeta = []; // 存储结构：[{path: "...", original_name: "..."}, ...]

                for (let i = 0; i < selectedFiles.length; i++) {
                    const file = selectedFiles[i];

                    // 生成纯 ASCII 的安全文件名，彻底避免中文/特殊字符
                    const safeFileName = generateSafeFileName(file.name);

                    // Storage 存储路径：文件夹名/安全文件名
                    const filePath = folderName + '/' + safeFileName;

                    // 更新进度提示
                    submitBtn.textContent = '上传文件 ' + (i + 1) + '/' + selectedFiles.length + '...';

                    // 执行上传
                    const { error: uploadError } = await supabaseClient.storage
                        .from(BUCKET_NAME)
                        .upload(filePath, file, {
                            // contentType 由浏览器自动推断，不强制指定
                            // upsert: false 表示路径已存在时报错（防止覆盖）
                            upsert: false
                        });

                    if (uploadError) {
                        // 上传失败：立即停止，显示具体错误，不写数据库
                        console.error('[文件上传失败]', filePath, uploadError);
                        throw new Error(
                            '文件「' + file.name + '」上传失败：' +
                            (uploadError.message || JSON.stringify(uploadError))
                        );
                    }

                    // 上传成功：记录路径与原始文件名的映射
                    fileMeta.push({
                        path: filePath,           // Storage 中的实际路径（纯 ASCII）
                        original_name: file.name  // 用户的原始文件名（可含中文）
                    });
                }

                // =============================================
                // 第二步：所有文件上传成功后，写入数据库
                // file_meta 存储 JSON 数组，admin 端据此显示原始文件名
                // =============================================
                submitBtn.textContent = '保存记录...';

                const { error: dbError } = await supabaseClient
                    .from('submissions')
                    .insert({
                        name: name,
                        phone: phone,
                        description: description,
                        folder_name: folderName,
                        file_count: fileMeta.length,  // 实际上传成功的文件数
                        file_meta: fileMeta            // JSON 数组：路径 + 原始文件名
                    });

                if (dbError) {
                    // 数据库写入失败：提示用户，但文件已上传（不自动删除，避免误删）
                    console.error('[数据库写入失败]', dbError);
                    throw new Error(
                        '文件上传成功，但记录保存失败：' + dbError.message +
                        '。请联系管理员处理（文件夹编号：' + folderName + '）'
                    );
                }

                // =============================================
                // 第三步：提交成功
                // =============================================
                showStatus(
                    '提交成功！线索编号：' + folderName + '，共上传 ' + fileMeta.length + ' 个文件。请截图保存此编号以便后续查询。',
                    'success'
                );

                // 重置表单
                form.reset();
                selectedFiles = [];
                renderFileList();

            } catch (err) {
                // 统一错误处理：显示具体错误信息
                console.error('[提交失败]', err);
                let msg = '提交失败，请稍后重试。';
                if (err.message && err.message.indexOf('Failed to fetch') !== -1) {
                    msg = '网络连接失败，请检查网络后重试';
                } else if (err.message && err.message.indexOf('NetworkError') !== -1) {
                    msg = '网络连接失败，请检查网络后重试';
                } else if (err.message) {
                    // 直接显示具体错误，方便排查
                    msg = err.message;
                }
                showStatus(msg, 'error');
            } finally {
                // 无论成功失败，都恢复提交按钮
                submitBtn.disabled = false;
                submitBtn.textContent = '提交线索';
            }
        });

        // =============================================
        // 辅助函数
        // =============================================
        function showStatus(message, type) {
            statusMsg.classList.remove('hidden', 'bg-green-50', 'text-green-700', 'bg-red-50', 'text-red-700');
            if (type === 'success') {
                statusMsg.classList.add('bg-green-50', 'text-green-700');
            } else {
                statusMsg.classList.add('bg-red-50', 'text-red-700');
            }
            statusMsg.textContent = message;
            statusMsg.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }

        function hideStatus() {
            statusMsg.classList.add('hidden');
        }

        function showError(elementId, message) {
            const el = document.getElementById(elementId);
            if (el) {
                el.textContent = message;
                el.classList.remove('hidden');
            }
        }

        function hideError(elementId) {
            const el = document.getElementById(elementId);
            if (el) {
                el.classList.add('hidden');
            }
        }

        function escapeHtml(str) {
            const div = document.createElement('div');
            div.appendChild(document.createTextNode(str));
            return div.innerHTML;
        }
    }
    </script>
</body>
</html>
